<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0F0D0A;
    --bg2: #1A1612;
    --bg3: #242018;
    --gold: #C9A050;
    --gold-light: #E8C47A;
    --cream: #F5ECD7;
    --cream-dim: #C8B89A;
    --text: #E8E0D0;
    --muted: #7A7060;
    --border: #2E2820;
    --border-gold: #4A3A20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.4;
  }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 56px;
  }

  .header-label {
    font-size: 10px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 20px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }

  .header-label::before, .header-label::after {
    content: ''; display: block; width: 40px; height: 1px; background: var(--gold); opacity: 0.4;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 500;
    line-height: 1.15;
    color: var(--cream);
    margin-bottom: 16px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .header-sub {
    font-size: 15px; color: var(--cream-dim); font-weight: 300;
    max-width: 460px; margin: 0 auto;
  }

  /* Progress */
  .progress-wrap {
    margin-bottom: 36px;
  }

  .progress-info {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
    font-size: 12px; color: var(--muted); letter-spacing: 1px;
  }

  .progress-bar {
    height: 2px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Question card */
  .question-card {
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-num {
    font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 14px;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 500;
    color: var(--cream);
    line-height: 1.3;
    margin-bottom: 32px;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex; align-items: center; gap: 14px;
    text-align: left;
  }

  .option:hover {
    border-color: var(--border-gold);
    background: var(--bg3);
    transform: translateX(4px);
  }

  .option.selected {
    border-color: var(--gold);
    background: rgba(201, 160, 80, 0.08);
  }

  .option-letter {
    width: 28px; height: 28px; flex-shrink: 0;
    border: 1px solid var(--border-gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--muted);
    transition: all 0.2s;
  }

  .option.selected .option-letter {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg);
  }

  .option-text {
    font-size: 15px; color: var(--cream-dim); font-weight: 300; line-height: 1.5;
    transition: color 0.2s;
  }

  .option.selected .option-text { color: var(--cream); }

  /* Next button */
  .btn-next {
    margin-top: 28px;
    width: 100%;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 16px 24px;
    font-family: 'Jost', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    opacity: 0; pointer-events: none;
  }

  .btn-next.visible {
    opacity: 1; pointer-events: all;
    animation: fadeUp 0.3s ease forwards;
  }

  .btn-next:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
  }

  /* Result */
  .result-card {
    animation: fadeUp 0.5s ease forwards;
  }

  .result-header {
    text-align: center;
    padding: 40px 32px;
    background: var(--bg2);
    border: 1px solid var(--border-gold);
    border-radius: 16px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;

  .result-header::before {
    content: '';

  .result-icon { font-size: 40px; margin-bottom: 16px; }

  .result-type {
    font-size: 10px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px;
  }

  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 500;
    color: var(--cream);
    line-height: 1.2;

  .result-subtitle {
    font-size: 14px; color: var(--cream-dim); font-weight: 300;

  .result-body {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 20px;
  }

  .result-section { margin-bottom: 24px; }
  .result-section:last-child { margin-bottom: 0; }

  .result-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px;
  }

  .result-section-text {
    font-size: 15px; color: var(--cream-dim); line-height: 1.7; font-weight: 300;
  }

  .result-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

  .result-tag {
    font-size: 12px; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border-gold); color: var(--gold);
    font-weight: 400;
  }

  /* CTA */
  .cta-block {
    background: linear-gradient(135deg, rgba(201,160,80,0.12), rgba(201,160,80,0.04));
    border: 1px solid var(--border-gold);
    border-radius: 16px;
    padding: 28px 32px;
    text-align: center;
  }

  .cta-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 500;
    color: var(--cream); margin-bottom: 10px;
  }

  .cta-text {
    font-size: 14px; color: var(--cream-dim); font-weight: 300;
    margin-bottom: 22px; line-height: 1.6;
  }

  .cta-buttons { display: flex; flex-direction: column; gap: 10px; }

  .btn-primary {
    background: var(--gold);
    color: var(--bg);
    border: none; border-radius: 10px;
    padding: 15px 24px;
    font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; text-decoration: none; display: block;
    transition: all 0.2s;
  }

  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }

  .btn-secondary {
    background: transparent;
    color: var(--cream-dim);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 24px;
    font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 400; letter-spacing: 1px;
    cursor: pointer; text-decoration: none; display: block;
    transition: all 0.2s;

  .btn-secondary:hover { border-color: var(--border-gold); color: var(--cream); }

  .btn-restart {
    margin-top: 16px;
    font-size: 12px; color: var(--muted);
    background: none; border: none;
    cursor: pointer; letter-spacing: 1px;
    text-decoration: underline; text-underline-offset: 3px;

  .author-tag {
    text-align: center;

  .author-tag a:hover { color: var(--gold-light); }

  /* Score bar */
  .score-bars { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  .score-row { display: flex; align-items: center; gap: 12px; }
  .score-label { font-size: 12px; color: var(--muted); width: 130px; flex-shrink: 0; }
  .score-track { flex: 1; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 1s ease 0.3s; }

  .hidden { display: none; }
</style>
</head>

let current = 0;
let scores = [0, 0, 0, 0, 0, 0];
let selected = null;

function startQuiz() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  selected = null;
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);

  document.getElementById('progress-text').textContent = `Вопрос ${current + 1} из ${questions.length}`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const letters = ['А', 'Б', 'В', 'Г'];
  const html = `
    <div class="question-card">
      <div class="question-num">Вопрос ${current + 1}</div>
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="option" onclick="selectOption(${i})" id="opt-${i}">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${o.text}</div>
          </button>
        `).join('')}
      </div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">
        ${current < questions.length - 1 ? 'Следующий вопрос →' : 'Узнать результат →'}
      </button>
    </div>
  `;
  document.getElementById('question-wrap').innerHTML = html;
}

function selectOption(i) {
  selected = i;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  document.getElementById('btn-next').classList.add('visible');
}

function nextQuestion() {
  if (selected === null) return;
  const s = questions[current].options[selected].scores;
  s.forEach((v, i) => scores[i] += v);
  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz').classList.add('hidden');
  const winner = scores.indexOf(Math.max(...scores));
  const r = results[winner];

  const maxScore = Math.max(...scores);
  const barWidths = scores.map(s => maxScore > 0 ? Math.round((s / maxScore) * 100) : 0);
  const labels = ['На старте', 'В процессе', 'Готов черновик', 'Переработка', 'Самозванец', 'Уверенный'];

  document.getElementById('result').classList.remove('hidden');
  document.getElementById('result').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-icon">${r.icon}</div>
        <div class="result-type">${r.type}</div>
        <div class="result-title">${r.title}</div>
        <div class="result-subtitle">${r.subtitle}</div>
      </div>

      <div class="result-body">
        <div class="result-section">
          <div class="result-section-label">Ваша сила</div>
          <div class="result-section-text">${r.strength}</div>
        </div>
        <div class="result-section">
          <div class="result-section-label">Где застреваете</div>
          <div class="result-section-text">${r.weakness}</div>
        </div>
        <div class="result-section">
          <div class="result-section-label">Что сделать прямо сейчас</div>
          <div class="result-section-text">${r.advice}</div>
        </div>
        <div class="result-section">
          <div class="result-section-label">Над чем работать</div>
          <div class="result-tags">${r.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}</div>
        </div>
      </div>

      <div class="cta-block">
        <div class="cta-title">Хотите копнуть глубже?</div>
        <div class="cta-text">За 60 минут найдём конкретные точки роста именно для вашего текста и этапа</div>
        <div class="cta-buttons">
          <a href="${r.cta_primary_url}" target="_blank" class="btn-primary">${r.cta_primary}</a>
          <a href="${r.cta_secondary_url}" target="_blank" class="btn-secondary">${r.cta_secondary}</a>
        </div>
        <div style="margin-top:18px; padding:12px 16px; background:rgba(201,160,80,0.08); border:1px dashed rgba(201,160,80,0.4); border-radius:8px; font-size:13px; color:var(--cream-dim); line-height:1.6;">
          🎁 По промокоду <strong style="color:var(--gold);letter-spacing:2px;">LITRED</strong> — скидка 20% на все услуги и платные материалы
        </div>
      </div>

      <div style="text-align:center">
        <button class="btn-restart" onclick="restartQuiz()">Пройти тест заново</button>
      </div>

      <div class="author-tag">Тест от <a href="https://ngasparian.ru" target="_blank">Нины Гаспарян</a> — литературного редактора</div>
    </div>
  `;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function restartQuiz() {
  current = 0;
  scores = [0, 0, 0, 0, 0, 0];
  selected = null;
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQuestion();
  window.scrollTo({top: 0, behavior: 'smooth'});
}
